<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="unsafe-url">
  <meta name="robots" content="noindex,nofollow">
  <title>CTM Public Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      background: #080a0d;
      color: #f3f5f7;
      font-family: "Segoe UI Variable", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #080a0d;
    }
    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .gateway-bar {
      position: relative;
      z-index: 3;
      display: flex;
      min-height: 42px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 7px max(12px, env(safe-area-inset-right)) 7px max(12px, env(safe-area-inset-left));
      border-top: 2px solid #2ed398;
      border-bottom: 1px solid #272d35;
      background: #101318;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }
    .frame {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      display: block;
      background: #080a0d;
    }
    .fallback {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
      color: #929ba8;
      font-size: 11px;
    }
    .fallback a {
      flex: 0 0 auto;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid #353d48;
      border-radius: 4px;
      background: #15191f;
      color: #dce1e7;
      font-weight: 700;
      text-decoration: none;
    }
    .fallback span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .live-status {
      display: flex;
      min-width: 0;
      gap: 8px;
      align-items: center;
      color: #f3b84b;
      font-size: 11px;
      font-weight: 800;
      pointer-events: none;
    }
    .live-status.live {
      color: #2ed398;
    }
    .live-status.offline {
      color: #ff6b7d;
    }
    .live-status .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 9px currentColor;
    }
    .live-status .detail {
      overflow: hidden;
      color: #929ba8;
      font-size: 11px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (max-width: 520px) {
      .gateway-bar {
        min-height: 58px;
        align-items: flex-start;
        gap: 8px;
        padding-top: max(7px, env(safe-area-inset-top));
      }
      .live-status {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 2px 7px;
      }
      .live-status .detail {
        grid-column: 1 / -1;
        max-width: 65vw;
      }
      .fallback span { display: none; }
    }
  </style>
</head>
<body>
  <div class="gateway-bar">
    <div id="live-status" class="live-status checking" role="status" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span id="live-status-label">CHECKING &middot; &#25509;&#32154;&#30906;&#35469;&#20013;</span>
      <span id="live-status-detail" class="detail">&#12522;&#12450;&#12523;&#12479;&#12452;&#12512;&#25509;&#32154;&#12434;&#30906;&#35469;&#12375;&#12390;&#12356;&#12414;&#12377;</span>
    </div>
    <div class="fallback">
      <span>Updated 2026-07-23T05:51:32Z / GitHub miner + funding access</span>
      <a href="https://translator-independent-organisations-behalf.trycloudflare.com/?public=github">Open</a>
    </div>
  </div>
  <iframe id="ctm-frame" class="frame" src="https://translator-independent-organisations-behalf.trycloudflare.com/?public=github" title="CTM Public Monitor"></iframe>
  <script>
    window.CTM_MONITOR = {
      dashboardUrl: "https://translator-independent-organisations-behalf.trycloudflare.com/?public=github",
      baseUrl: "https://translator-independent-organisations-behalf.trycloudflare.com",
      generatedAt: "2026-07-23T05:51:32Z",
      stableUrl: "https://expresspath.github.io/crypto/",
      authMode: "public-viewer+tokenless-funding",
      tabForwarding: "v1",
      realtimeIndicator: "v3",
      gatewayUi: "terminal-v2",
      charsetMode: "ascii-utf8-nobom-v1"
    };
    const params = new URLSearchParams(window.location.search);
    const requestedTab = params.get("funding") === "1"
      ? "funding"
      : params.get("miner") === "1"
        ? "miner"
        : params.get("tab") || window.location.hash.slice(1);
    if (["miner", "funding"].includes(requestedTab)) {
      const targetUrl = window.CTM_MONITOR.dashboardUrl + "#" + requestedTab;
      document.querySelector("#ctm-frame").src = targetUrl;
      document.querySelector(".fallback a").href = targetUrl;
    }

    const liveStatus = document.querySelector("#live-status");
    const liveStatusLabel = document.querySelector("#live-status-label");
    const liveStatusDetail = document.querySelector("#live-status-detail");
    let healthRequest = null;

    function healthClock() {
      return new Date().toLocaleTimeString("ja-JP", { hour12: false });
    }

    function showRealtimeState(isLive) {
      liveStatus.classList.toggle("live", isLive);
      liveStatus.classList.toggle("offline", !isLive);
      liveStatus.classList.remove("checking");
      if (isLive) {
        liveStatusLabel.textContent = "LIVE \u00B7 \u30EA\u30A2\u30EB\u30BF\u30A4\u30E0";
        liveStatusDetail.textContent = "\u73FE\u5728\u306E\u7A3C\u50CD\u60C5\u5831\u3067\u3059 \u00B7 \u63A5\u7D9A\u78BA\u8A8D " + healthClock();
      } else {
        liveStatusLabel.textContent = "NOT LIVE \u00B7 \u30EA\u30A2\u30EB\u30BF\u30A4\u30E0\u60C5\u5831\u3067\u306F\u3042\u308A\u307E\u305B\u3093";
        liveStatusDetail.textContent = "PC\u307E\u305F\u306FCloudflare\u30C8\u30F3\u30CD\u30EB\u306B\u63A5\u7D9A\u3067\u304D\u307E\u305B\u3093 \u00B7 \u78BA\u8A8D " + healthClock();
      }
    }

    async function checkRealtime() {
      if (healthRequest) return healthRequest;
      healthRequest = (async () => {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), 8000);
        try {
          const response = await fetch(
            window.CTM_MONITOR.baseUrl + "/api/health?_r=" + Date.now(),
            { cache: "no-store", mode: "cors", signal: controller.signal }
          );
          const health = response.ok ? await response.json() : null;
          showRealtimeState(Boolean(health && health.ok && health.realtime));
        } catch {
          showRealtimeState(false);
        } finally {
          window.clearTimeout(timeout);
        }
      })();
      try {
        await healthRequest;
      } finally {
        healthRequest = null;
      }
    }

    checkRealtime();
    window.setInterval(checkRealtime, 15000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) checkRealtime();
    });
  </script>
</body>
</html>
